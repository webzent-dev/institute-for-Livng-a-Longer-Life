name: Deploy to Production

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [closed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install npm dependencies
      run: npm ci
      
    - name: Build assets
      run: npm run build
      
    - name: Clean up node_modules
      run: rm -rf node_modules
      
    - name: Deploy to server via FTP
      uses: SamKirkland/FTP-Deploy-Action@4.3.0
      with:
        server: 190.92.174.27
        username: living@bikewrapt.com
        password: webzent@123
        local-dir: ./
        server-dir: /home/bike/public_html/
        exclude: 
          - .git*
          - .github/**
          - node_modules/**
          - .env*
          - storage/logs/**
          - storage/framework/cache/**
          - storage/framework/sessions/**
          - storage/framework/testing/**
          - storage/framework/views/**
          - bootstrap/cache/**
          - vendor/**
          - old/**
          - tests/**
          - .gitignore
          - README.md
          - artisan
          - composer.json
          - composer.lock
          - package.json
          - package-lock.json
          - phpunit.xml
          - postcss.config.js
          - tailwind.config.js
          - npm
          - .editorconfig
          - .gitattributes

name: Deploy to Production

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [closed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install npm dependencies
      run: npm ci
      
    - name: Build assets
      run: npm run build
      
    - name: Clean up node_modules
      run: rm -rf node_modules
      
    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@v40
      with:
        files: |
          **/*.php
          **/*.js
          **/*.css
          **/*.html
          **/*.json
          public/**
          resources/**
          app/**
          config/**
          database/**
          routes/**
          
    - name: List all changed files
      run: |
        echo "Changed files: ${{ steps.changed-files.outputs.all_changed_files }}"
        
    - name: Create deployment directory with changed files
      if: steps.changed-files.outputs.any_changed == 'true'
      run: |
        mkdir -p deploy
        rsync -av --files-from=<(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n') . deploy/ 2>/dev/null || true
        # Copy directories that contain changed files
        for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
          if [ -f "$file" ]; then
            mkdir -p "deploy/$(dirname "$file")"
            cp "$file" "deploy/$file"
          fi
        done
        
    - name: Deploy only changed files to server via FTP
      if: steps.changed-files.outputs.any_changed == 'true'
      uses: SamKirkland/FTP-Deploy-Action@4.3.0
      with:
        server: ftp.bikewrapt.com
        username: living@bikewrapt.com
        password: webzent@123
        server-dir: /
        protocol: ftp
        port: 21
        local-dir: deploy/
        dangerous-clean-slate: false
        sync: false
        state-name: .ftp-deploy-sync-state.json
        exclude: .git/**, .git*, .github/**, node_modules/**, .env*, storage/logs/**, storage/framework/cache/**, storage/framework/sessions/**, storage/framework/testing/**, storage/framework/views/**, bootstrap/cache/**, vendor/**, old/**, tests/**, .gitignore, README.md, artisan, composer.json, composer.lock, package.json, package-lock.json, phpunit.xml, postcss.config.js, tailwind.config.js, npm, .editorconfig, .gitattributes
